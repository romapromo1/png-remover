<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --slider-pos: 50%;
            --slider-pos-ratio: 0.5;
            --accent-gold: #d4af37;
            --accent-silver: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #0c0c0b;
            color: #ffffff;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centered Main Viewport Container */
        .comparison-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Lock 16:9 aspect ratio */
            max-height: 100vh;
            max-width: 177.78vh; /* Lock 16:9 to fully fit screen height on ultra-wide */
            overflow: hidden;
            cursor: ew-resize;
            background-color: #0c0c0b;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9);
            touch-action: none;
        }

        .comparison-container.dragging {
            cursor: grabbing;
        }

        /* Image Wrappers */
        .image-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .image-wrapper img.loaded {
            opacity: 1;
        }

        /* The "Before" (Было) image is on top and clipped dynamically */
        .image-before {
            z-index: 2;
            will-change: clip-path, -webkit-clip-path;
            clip-path: polygon(0% 0%, 50% 0%, 50% 100%, 0% 100%);
            -webkit-clip-path: polygon(0% 0%, 50% 0%, 50% 100%, 0% 100%);
        }

        /* The "After" (Стало) image is in the background */
        .image-after {
            z-index: 1;
        }

        /* Fullscreen Canvas for Lightning Rendering */
        .lightning-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* 3D Liquid Glass Sidebar Container */
        .sidebar-carousel-container {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            width: 130px;
            height: 400px;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        /* Scale down sidebar on portrait/vertical viewports to fit the container height */
        @media (max-aspect-ratio: 1/1) {
            .sidebar-carousel-container {
                transform: translateY(-50%) scale(0.5);
                transform-origin: left center;
                left: 15px;
            }
        }
        
        @media (max-aspect-ratio: 1/1) and (min-width: 600px) {
            .sidebar-carousel-container {
                transform: translateY(-50%) scale(0.75);
            }
        }

        @media (max-aspect-ratio: 1/1) and (min-width: 768px) {
            .sidebar-carousel-container {
                transform: translateY(-50%) scale(0.9);
            }
        }

        /* The glass tube background behind the cards (only visible when expanded) */
        .sidebar-track {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            background: rgba(18, 18, 16, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.05);
            transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%) scaleY(0.1);
        }

        .sidebar-carousel-container.expanded .sidebar-track {
            opacity: 1;
            transform: translateX(-50%) scaleY(1);
        }

        /* Clipper wrapper for cards to prevent vertical overflow while allowing shadow diffusion */
        .cards-clipper {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            overflow: hidden;
            pointer-events: none;
        }

        /* Individual Card styles */
        .carousel-card {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: -45px; /* half of 90px width */
            margin-top: -34px;  /* half of 68px height */
            width: 90px;
            height: 68px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            cursor: pointer;
            perspective: 800px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.05);
            transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.6s ease, 
                        box-shadow 0.6s ease;
            overflow: hidden;
            z-index: 5;
        }

        .carousel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none;
        }

        /* Glass sheen reflection overlay for authentic liquid glass look */
        .card-glass-reflection {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.22) 0%,
                rgba(255, 255, 255, 0) 50%,
                rgba(255, 255, 255, 0.08) 100%
            );
            border-radius: inherit;
            pointer-events: none;
            z-index: 2;
        }

        /* 3D hover effects when list is active and card is not central */
        .carousel-card.clickable:hover {
            transform: translate3d(0, var(--card-translate-y), 0) scale(1.08) rotateX(12deg) rotateY(-8deg) !important;
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(212, 175, 55, 0.08);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.25), 
                        inset 0 0 12px rgba(255, 255, 255, 0.18);
        }

        /* Expanded Active (Central) Card */
        .carousel-card.active-center {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.18);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.45), 
                        inset 0 0 18px rgba(212, 175, 55, 0.25);
            z-index: 10;
        }

        .carousel-card.active-center img {
            filter: brightness(1.15) contrast(1.1);
        }

        /* "ЕЩЁ" Card */
        .card-more {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-left: -45px;
            margin-top: -34px;
            width: 90px;
            height: 68px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), inset 0 0 12px rgba(255, 255, 255, 0.1);
            transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.6s ease,
                        box-shadow 0.6s ease;
            z-index: 15;
            overflow: hidden;
        }

        .card-more:hover {
            transform: scale(1.1) rotateX(12deg) rotateY(-8deg);
            border-color: var(--accent-gold);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.35), inset 0 0 15px rgba(212, 175, 55, 0.25);
        }

        .card-more-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(45deg, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
            z-index: 3;
        }

        /* Spinner Overlay */
        .spinner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 12, 11, 0.75);
            z-index: 90;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .spinner-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-gold);
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

<body>


    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const locations = [
            {
                id: "lobby_1",
                before: "pic/Вестибюль_1_ДО.jpg",
                after: "pic/Вестибюль_1.jpg"
            },
            {
                id: "lobby_3",
                before: "pic/Вестибюль_3_ДО.jpg",
                after: "pic/Вестибюль_3.jpg"
            },
            {
                id: "concert_1",
                before: "pic/Концертный_зал_1_ДО.jpg",
                after: "pic/Концертный_зал_1.jpg"
            },
            {
                id: "concert_2",
                before: "pic/Концертный_зал_2_до.jpg",
                after: "pic/Концертный_зал_2.jpg"
            },
            {
                id: "concert_3",
                before: "pic/Концертный_зал_3_ДО.jpg",
                after: "pic/Концертный_зал_3.jpg"
            },
            {
                id: "lounge_2",
                before: "pic/Лаундж_2_ДО.jpg",
                after: "pic/Лаундж_2.jpg"
            },
            {
                id: "lounge_3",
                before: "pic/Лаундж_3 ДО.jpg",
                after: "pic/Лаундж_3.jpg"
            },
            {
                id: "private_2",
                before: "pic/Приватные_команты_2_до.jpg",
                after: "pic/Приватные_команты_2.jpg"
            }
        ];

        const getCircularOffset = (index, activeIndex, total) => {
            let diff = index - activeIndex;
            const half = total / 2;
            if (diff > half) {
                diff -= total;
            } else if (diff <= -half) {
                diff += total;
            }
            return diff;
        };

        function App() {
            const [activeLocIndex, setActiveLocIndex] = useState(0);
            const [sliderPos, setSliderPos] = useState(50); // Set default to 50% split
            const [isDragging, setIsDragging] = useState(false);
            const [isCollapsed, setIsCollapsed] = useState(true);
            
            const [beforeLoaded, setBeforeLoaded] = useState(false);
            const [afterLoaded, setAfterLoaded] = useState(false);

            // Floating point scroll offset for smooth momentum scrolling
            const [scrollOffset, setScrollOffset] = useState(0);

            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            const timerRef = useRef(null);
            const sidebarRef = useRef(null);

            // Scroll dynamics refs
            const scrollOffsetRef = useRef(0);
            const velocityRef = useRef(0);
            const targetIndexRef = useRef(0);
            const isDraggingSidebarRef = useRef(false);
            const lastTouchYRef = useRef(0);
            const lastTouchTimeRef = useRef(0);
            const touchStartRef = useRef({ x: 0, y: 0 });
            const touchDirectionRef = useRef(null);
            const isScrollingWheelRef = useRef(false);
            
            // Web Audio API refs for zero-latency UI sound effects
            const audioContextRef = useRef(null);
            const audioBufferRef = useRef(null);
            const beforeImgRef = useRef(null);

            // Cache DOM reference for the masked image to avoid querying DOM 60 times a second
            useEffect(() => {
                beforeImgRef.current = document.querySelector('.image-before');
            }, []);

            // Preload click sound via Web Audio API and decode in memory
            useEffect(() => {
                const initAudio = () => {
                    if (audioContextRef.current) return;
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextClass) return;
                    audioContextRef.current = new AudioContextClass();
                    
                    // Load transition/click sound
                    fetch('./click.mp3')
                        .then(response => response.arrayBuffer())
                        .then(arrayBuffer => {
                            if (audioContextRef.current) {
                                return audioContextRef.current.decodeAudioData(arrayBuffer);
                            }
                        })
                        .then(audioBuffer => {
                            if (audioBuffer) {
                                audioBufferRef.current = audioBuffer;
                            }
                        })
                        .catch(err => console.log("Web Audio preloading click failed:", err));
                };

                const unlock = () => {
                    initAudio();
                    if (audioContextRef.current && audioContextRef.current.state === 'suspended') {
                        audioContextRef.current.resume();
                    }
                };

                // Unlock audio context on first mousedown/touchstart/wheel interaction
                window.addEventListener('mousedown', unlock, { once: false });
                window.addEventListener('touchstart', unlock, { once: false });
                window.addEventListener('wheel', unlock, { once: false });

                return () => {
                    window.removeEventListener('mousedown', unlock);
                    window.removeEventListener('touchstart', unlock);
                    window.removeEventListener('wheel', unlock);
                };
            }, []);

            const playClickSound = () => {
                const ctx = audioContextRef.current;
                const buffer = audioBufferRef.current;
                if (ctx && buffer) {
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    
                    // Create lowpass filter to muffle the click sound ("глуше")
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1200; // cutoff frequency in Hz
                    
                    // Create gain node to make the sound subtle and soft
                    const gainNode = ctx.createGain();
                    gainNode.gain.value = 0.6;
                    
                    source.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    source.start(0);
                }
            };


            
            // Mutable references for animation loop parameters
            const timeRef = useRef(0);
            const sliderPosRef = useRef(50);
            const prevXRef = useRef(null);
            const [winSize, setWinSize] = useState({ w: window.innerWidth, h: window.innerHeight });

            // Sync refs for the animation loops
            const activeLocIndexRef = useRef(0);
            useEffect(() => {
                activeLocIndexRef.current = activeLocIndex;
            }, [activeLocIndex]);

            const isCollapsedRef = useRef(true);
            useEffect(() => {
                isCollapsedRef.current = isCollapsed;
            }, [isCollapsed]);

            // Keep reference updated to read the latest state inside animation frames
            useEffect(() => {
                sliderPosRef.current = sliderPos;
            }, [sliderPos]);

            // Handle resize dynamically mapping to container bounds
            useEffect(() => {
                const handleResize = () => {
                    const container = containerRef.current;
                    const canvas = canvasRef.current;
                    if (container && canvas) {
                        const rect = container.getBoundingClientRect();
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                        setWinSize({ w: rect.width, h: rect.height });
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize(); // Initial call
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const lastTickedIndexRef = useRef(0);

            // Helper to update both state and ref for scroll offset
            const updateScrollOffset = (val) => {
                const len = locations.length;
                const normalized = (val % len + len) % len;
                
                const diff = getCircularOffset(normalized, lastTickedIndexRef.current, len);
                if (Math.abs(diff) >= 0.65) {
                    playClickSound();
                    lastTickedIndexRef.current = (Math.round(normalized) % len + len) % len;
                }
                
                scrollOffsetRef.current = normalized;
                setScrollOffset(normalized);
            };

            // Inactivity timer logic (only for touch-based devices / mobile collapse)
            const resetInactivityTimer = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                }
                timerRef.current = setTimeout(() => {
                    setIsCollapsed(true);
                }, 2000);
            };

            const handleSidebarInteraction = () => {
                setIsCollapsed(false);
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                }
            };

            const handleSidebarMouseLeave = () => {
                setIsCollapsed(true);
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                }
            };

            // Cleanup timer on unmount
            useEffect(() => {
                return () => {
                    if (timerRef.current) clearTimeout(timerRef.current);
                };
            }, []);

            const triggerActiveLocationUpdate = (idx) => {
                const targetIdx = (idx + locations.length) % locations.length;
                setActiveLocIndex(targetIdx);
                setBeforeLoaded(false);
                setAfterLoaded(false);
            };

            // Global Wheel gesture handler on container
            useEffect(() => {
                const container = containerRef.current;
                if (!container) return;

                let wheelTimeout;
                const onWheelEvent = (e) => {
                    if (isCollapsedRef.current) {
                        setIsCollapsed(false);
                    }
                    e.preventDefault();
                    
                    isScrollingWheelRef.current = true;
                    
                    // Accumulate velocity based on scroll direction (deltaY)
                    velocityRef.current += e.deltaY * 0.0008;
                    
                    // Cap maximum velocity for smooth control
                    const maxVel = 0.25;
                    if (velocityRef.current > maxVel) velocityRef.current = maxVel;
                    if (velocityRef.current < -maxVel) velocityRef.current = -maxVel;
                    
                    targetIndexRef.current = null; // override snap targets during scroll
                    handleSidebarInteraction();
                    
                    // Reset inactivity timer and wheel scroll state when wheel stops
                    clearTimeout(wheelTimeout);
                    wheelTimeout = setTimeout(() => {
                        isScrollingWheelRef.current = false;
                        resetInactivityTimer();
                    }, 150);
                };

                container.addEventListener('wheel', onWheelEvent, { passive: false });

                return () => {
                    container.removeEventListener('wheel', onWheelEvent);
                    clearTimeout(wheelTimeout);
                };
            }, []);

            const handleCardInteraction = (locIdx) => {
                targetIndexRef.current = locIdx;
                velocityRef.current = 0; // stop any ongoing momentum scroll
                handleSidebarInteraction();
            };

            // Physics Update Loop: handles inertia damping and spring-to-target alignment
            useEffect(() => {
                let animationFrameId;

                const updatePhysics = () => {
                    if (isCollapsedRef.current) {
                        animationFrameId = requestAnimationFrame(updatePhysics);
                        return;
                    }

                    if (!isDraggingSidebarRef.current) {
                        // If we don't have a target index yet, check if velocity is low enough to start snapping
                        // But only when not actively scrolling with the wheel
                        if (targetIndexRef.current === null && !isScrollingWheelRef.current && Math.abs(velocityRef.current) < 0.05) {
                            const len = locations.length;
                            targetIndexRef.current = (Math.round(scrollOffsetRef.current) % len + len) % len;
                        }

                        if (targetIndexRef.current !== null) {
                            // Spring snapping physics (iOS Picker Wheel feel)
                            const current = scrollOffsetRef.current;
                            const target = targetIndexRef.current;
                            const diff = getCircularOffset(target, current, locations.length);

                            // Spring force pulling towards target index
                            const springForce = diff * 0.035; 
                            velocityRef.current += springForce;
                            velocityRef.current *= 0.88; // damping/friction during snap phase
                            
                            let nextOffset = current + velocityRef.current;
                            updateScrollOffset(nextOffset);

                            if (Math.abs(diff) < 0.002 && Math.abs(velocityRef.current) < 0.002) {
                                updateScrollOffset(target);
                                velocityRef.current = 0;
                                if (target !== activeLocIndexRef.current) {
                                    triggerActiveLocationUpdate(target);
                                }
                            }
                        } else {
                            // Pure inertia decay
                            let nextOffset = scrollOffsetRef.current + velocityRef.current;
                            velocityRef.current *= 0.95; // smooth friction decay
                            updateScrollOffset(nextOffset);
                        }
                    }

                    // Dynamically trigger location change when target index gets very close to center
                    if (targetIndexRef.current !== null) {
                        const dist = Math.abs(getCircularOffset(targetIndexRef.current, scrollOffsetRef.current, locations.length));
                        if (dist < 0.18 && targetIndexRef.current !== activeLocIndexRef.current) {
                            triggerActiveLocationUpdate(targetIndexRef.current);
                        }
                    }

                    animationFrameId = requestAnimationFrame(updatePhysics);
                };

                animationFrameId = requestAnimationFrame(updatePhysics);
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            // Lightning Animation and Mask update Loop
            useEffect(() => {
                let animationFrameId;
                
                const renderLightning = () => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const width = canvas.width;
                    const height = canvas.height;
                    const beforeImg = beforeImgRef.current || document.querySelector('.image-before');
                    
                    // Clear canvas
                    ctx.clearRect(0, 0, width, height);

                    const currentSliderPercent = sliderPosRef.current;
                    const targetX = (currentSliderPercent / 100) * width;

                    // Initialize prevX if null
                    if (prevXRef.current === null) {
                        prevXRef.current = targetX;
                    }

                    // Calculate physical movement speed (delta)
                    const deltaX = targetX - prevXRef.current;
                    prevXRef.current = targetX;

                    // Adjust time increment based on movement velocity
                    const dt = Math.abs(deltaX) > 0.01 ? 0.015 : 0.003;
                    timeRef.current += dt;
                    const time = timeRef.current;

                    // Boundary conditions for full screen reveals
                    if (currentSliderPercent >= 99.8) {
                        if (beforeImg) {
                            const clipStr = `polygon(0px 0px, ${width}px 0px, ${width}px ${height}px, 0px ${height}px)`;
                            beforeImg.style.clipPath = clipStr;
                            beforeImg.style.webkitClipPath = clipStr;
                        }
                        animationFrameId = requestAnimationFrame(renderLightning);
                        return;
                    }
                    if (currentSliderPercent <= 0.2) {
                        if (beforeImg) {
                            const clipStr = `polygon(0px 0px, 0px 0px, 0px ${height}px, 0px ${height}px)`;
                            beforeImg.style.clipPath = clipStr;
                            beforeImg.style.webkitClipPath = clipStr;
                        }
                        animationFrameId = requestAnimationFrame(renderLightning);
                        return;
                    }

                    // Generate coordinates for the lightning path (stepY=18 saves 45% CPU math vs stepY=10)
                    const points = [];
                    const stepY = 18;
                    const steps = Math.ceil(height / stepY);
                    const sliderFactor = currentSliderPercent * 0.03;

                    for (let i = 0; i <= steps; i++) {
                        const y = i * stepY;
                        
                        // Noise waves for generating organic lightning bends
                        const noiseVal = 
                            Math.sin(y * 0.015 + time * 1.5 + sliderFactor) * 0.5 +
                            Math.sin(y * 0.04 - time * 2.2 + sliderFactor * 1.5) * 0.35 +
                            Math.cos(y * 0.1 + time * 4.0) * 0.15;

                        // Maximum wiggling displacement amplitude is 15 pixels
                        const dx = noiseVal * 15;
                        points.push({ x: targetX + dx, y: y });
                    }

                    // Update the clip-path coordinates of the before image (100% compatible with Safari/Chrome)
                    if (beforeImg) {
                        const clipPoints = `polygon(0px 0px, ` + points.map(p => `${Math.round(p.x)}px ${Math.round(p.y)}px`).join(', ') + `, 0px ${height}px)`;
                        beforeImg.style.clipPath = clipPoints;
                        beforeImg.style.webkitClipPath = clipPoints;
                    }

                    // Draw the glowing lightning bolt
                    const flicker = 0.85 + 0.15 * Math.sin(time * 3.5) * Math.cos(time * 1.2);

                    // Outer glowing path
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 35;
                    ctx.strokeStyle = `rgba(255, 140, 0, ${0.08 * flicker})`;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();

                    // Multi-pass golden glow for maximum GPU rendering performance (replacing heavy shadowBlur)
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    // 1. Soft wide glow
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 24;
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.12 * flicker})`;
                    ctx.stroke();

                    // 2. Medium glow
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 12;
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.28 * flicker})`;
                    ctx.stroke();

                    // 3. Core golden stroke
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = `rgba(212, 175, 55, ${0.45 * flicker})`;
                    ctx.stroke();

                    // Inner bright core
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 2.0;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * flicker})`;
                    ctx.stroke();

                    animationFrameId = requestAnimationFrame(renderLightning);
                };

                animationFrameId = requestAnimationFrame(renderLightning);
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            // Handle slider position updates
            const updatePosition = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = clientX - rect.left;
                let percentage = (x / rect.width) * 100;
                if (percentage < 0) percentage = 0;
                if (percentage > 100) percentage = 100;
                
                setSliderPos(percentage);
            };

            // Pointer Event Handlers (Unifies Mouse and Touch for all devices, including iPad)
            const handlePointerDown = (e) => {
                if (e.button !== 0 && e.pointerType === 'mouse') return;
                const container = containerRef.current;
                if (!container) return;
                
                try {
                    container.setPointerCapture(e.pointerId);
                } catch (err) {}

                touchStartRef.current = { x: e.clientX, y: e.clientY, time: performance.now() };
                touchDirectionRef.current = null;
                isDraggingSidebarRef.current = false;
                lastTouchYRef.current = e.clientY;
                lastTouchTimeRef.current = performance.now();
                velocityRef.current = 0;
            };

            const handlePointerMove = (e) => {
                if (!touchStartRef.current) return;
                const deltaX = e.clientX - touchStartRef.current.x;
                const deltaY = e.clientY - touchStartRef.current.y;
                
                if (touchDirectionRef.current === null) {
                    const distSq = deltaX * deltaX + deltaY * deltaY;
                    if (distSq > 64) { // 8px threshold
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            touchDirectionRef.current = 'horizontal';
                            setIsDragging(true);
                            setIsCollapsed(true);
                            if (timerRef.current) {
                                clearTimeout(timerRef.current);
                            }
                            updatePosition(e.clientX);
                        } else {
                            touchDirectionRef.current = 'vertical';
                            isDraggingSidebarRef.current = true;
                            targetIndexRef.current = null;
                            setIsCollapsed(false);
                            handleSidebarInteraction();
                        }
                    }
                }
                
                if (touchDirectionRef.current === 'vertical') {
                    const currentY = e.clientY;
                    const currentTime = performance.now();
                    const dY = currentY - lastTouchYRef.current;
                    const timeDelta = currentTime - lastTouchTimeRef.current;

                    // 78px = 1 item height offset unit
                    const deltaOffset = -dY / 78;
                    const newOffset = scrollOffsetRef.current + deltaOffset;
                    updateScrollOffset(newOffset);

                    if (timeDelta > 0) {
                        velocityRef.current = deltaOffset / timeDelta * 16.67;
                    }

                    lastTouchYRef.current = currentY;
                    lastTouchTimeRef.current = currentTime;
                    handleSidebarInteraction();
                } else if (touchDirectionRef.current === 'horizontal') {
                    updatePosition(e.clientX);
                }
            };

            const handlePointerUp = (e) => {
                if (!touchStartRef.current) return;
                const container = containerRef.current;
                if (container) {
                    try {
                        container.releasePointerCapture(e.pointerId);
                    } catch (err) {}
                }
                
                if (touchDirectionRef.current === 'horizontal') {
                    setIsDragging(false);
                } else if (touchDirectionRef.current === 'vertical') {
                    isDraggingSidebarRef.current = false;
                    if (Math.abs(velocityRef.current) < 0.05) {
                        const len = locations.length;
                        targetIndexRef.current = (Math.round(scrollOffsetRef.current) % len + len) % len;
                    }
                    resetInactivityTimer();
                }
                touchDirectionRef.current = null;
                touchStartRef.current = null;
            };

            const posRatio = sliderPos / 100;
            const isPageLoading = !beforeLoaded || !afterLoaded;
            const activeLoc = locations[activeLocIndex];

            return (
                <div 
                    ref={containerRef}
                    className={`comparison-container ${isDragging ? 'dragging' : ''}`}
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={handlePointerUp}
                    style={{
                        '--slider-pos': `${sliderPos}%`,
                        '--slider-pos-ratio': posRatio
                    }}
                >
                    {/* Glassmorphic 3D Carousel Sidebar Container */}
                    <div 
                        ref={sidebarRef}
                        className={`sidebar-carousel-container ${!isCollapsed ? 'expanded' : ''}`}
                        onMouseEnter={handleSidebarInteraction}
                        onMouseMove={handleSidebarInteraction}
                        onMouseLeave={handleSidebarMouseLeave}
                        onMouseDown={(e) => e.stopPropagation()}
                        onPointerDown={(e) => e.stopPropagation()}
                        style={{
                            pointerEvents: isCollapsed ? 'none' : 'auto'
                        }}
                    >
                        {/* Glass tube track background */}
                        <div className="sidebar-track"></div>

                        {/* Collapsed "ЕЩЁ" card */}
                        <div 
                            className="card-more"
                            style={{
                                opacity: isCollapsed ? 1 : 0,
                                transform: isCollapsed ? 'scale(1)' : 'scale(0.5)',
                                pointerEvents: isCollapsed ? 'auto' : 'none'
                            }}
                            onClick={(e) => {
                                e.stopPropagation();
                                handleSidebarInteraction();
                                resetInactivityTimer();
                            }}
                            onMouseEnter={(e) => {
                                e.stopPropagation();
                                handleSidebarInteraction();
                            }}
                        >
                            <div className="card-glass-reflection"></div>
                            <span className="card-more-text">ЕЩЁ</span>
                        </div>

                        {/* Wrapper to clip cards vertically while permitting soft horizontal shadow spill */}
                        <div className="cards-clipper">
                            {/* Infinite vertical list cards mapping all locations with stable key */}
                            {locations.map((loc, locIdx) => {
                                const offset = getCircularOffset(locIdx, scrollOffset, locations.length);
                                
                                // Calculate properties based on offset and collapse state
                                const yTranslate = isCollapsed ? 0 : offset * 78;
                                
                                let scaleVal;
                                if (isCollapsed) {
                                    scaleVal = 0.8;
                                } else {
                                    scaleVal = (1 - Math.abs(offset) * 0.05) + 0.15 * Math.max(0, 1 - Math.abs(offset));
                                    if (scaleVal < 0.5) scaleVal = 0.5;
                                }
                                
                                let opacityVal;
                                if (isCollapsed) {
                                    opacityVal = 0;
                                } else {
                                    opacityVal = 1 - Math.abs(offset) * 0.25;
                                    if (opacityVal < 0) opacityVal = 0;
                                }
                                
                                const isInteracting = isDraggingSidebarRef.current || velocityRef.current !== 0 || isScrollingWheelRef.current;
                                const cardStyle = {
                                    '--card-translate-y': `${yTranslate}px`,
                                    transform: `translate3d(0, ${yTranslate}px, 0) scale(${scaleVal})`,
                                    opacity: opacityVal,
                                    pointerEvents: (!isCollapsed && Math.abs(offset) <= 2.2) ? 'auto' : 'none',
                                    zIndex: Math.round(offset === 0 ? 10 : (10 - Math.abs(offset))),
                                    transition: isInteracting ? 'none' : ''
                                };

                                const isInteractive = !isCollapsed && Math.abs(offset) <= 2.2;
                                const isCenter = Math.abs(offset) < 0.5;
                                const cardClass = `carousel-card ${isCenter ? 'active-center' : ''} ${isInteractive && !isCenter ? 'clickable' : ''}`;

                                return (
                                    <div 
                                        key={loc.id}
                                        className={cardClass}
                                        style={cardStyle}
                                        onClick={() => {
                                            if (isInteractive) {
                                                handleCardInteraction(locIdx);
                                            }
                                        }}
                                    >
                                        <div className="card-glass-reflection"></div>
                                        <img 
                                            src={loc.after} 
                                            alt={loc.id} 
                                        />
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Loader Spinner Overlay */}
                    <div className={`spinner-overlay ${isPageLoading ? 'show' : ''}`}>
                        <div className="spinner"></div>
                    </div>

                    {/* Canvas for Rendering the Lightning Bolt */}
                    <canvas ref={canvasRef} className="lightning-canvas" />

                    {/* Before Image (Top Layer) */}
                    <div ref={beforeImgRef} className="image-wrapper image-before">
                        <img 
                            src={activeLoc.before} 
                            alt="Было"
                            className={beforeLoaded ? 'loaded' : ''}
                            onLoad={() => setBeforeLoaded(true)}
                        />
                    </div>

                    {/* After Image (Base Layer) */}
                    <div className="image-wrapper image-after">
                        <img 
                            src={activeLoc.after} 
                            alt="Стало"
                            className={afterLoaded ? 'loaded' : ''}
                            onLoad={() => setAfterLoaded(true)}
                        />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
