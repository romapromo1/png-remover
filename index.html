<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение локаций: Было / Стало</title>
    <!-- Google Fonts for luxurious typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <style>
        :root {
            --slider-pos: 50%;
            --slider-pos-ratio: 0.5;
            --accent-gold: #d4af37;
            --accent-silver: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #0c0c0b;
            color: #ffffff;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centered Main Viewport Container */
        .comparison-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; /* Lock 16:9 to fully fit screen height on ultra-wide */
            overflow: hidden;
            cursor: ew-resize;
            background-color: #0c0c0b;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9);
        }

        .comparison-container.dragging {
            cursor: grabbing;
        }

        /* Image Wrappers */
        .image-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .image-wrapper img.loaded {
            opacity: 1;
        }

        /* The "Before" (Было) image is on top and masked by SVG */
        .image-before {
            z-index: 2;
            will-change: mask, -webkit-mask;
            mask: url(#lightning-mask);
            -webkit-mask: url(#lightning-mask);
        }

        /* The "After" (Стало) image is in the background */
        .image-after {
            z-index: 1;
        }

        /* Fullscreen Canvas for Lightning Rendering */
        .lightning-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* 3D Liquid Glass Sidebar Container */
        .sidebar-carousel-container {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            width: 130px;
            height: 460px;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        /* The glass tube background behind the cards (only visible when expanded) */
        .sidebar-track {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            background: rgba(18, 18, 16, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.05);
            transition: opacity 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%) scaleY(0.1);
        }

        .sidebar-carousel-container.expanded .sidebar-track {
            opacity: 1;
            transform: translateX(-50%) scaleY(1);
        }

        /* Individual Card styles */
        .carousel-card {
            position: absolute;
            left: 50%;
            margin-left: -45px; /* half of 90px width */
            width: 90px;
            height: 68px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            cursor: pointer;
            perspective: 800px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.05);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s ease, 
                        box-shadow 0.4s ease;
            overflow: visible;
            z-index: 5;
        }

        .carousel-card img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 3D hover effects when list is active and card is not central */
        .carousel-card.clickable:hover {
            transform: translate3d(0, var(--card-translate-y), 0) scale(1.08) rotateX(12deg) rotateY(-8deg) !important;
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.2), 
                        inset 0 0 12px rgba(255, 255, 255, 0.15);
        }

        /* Expanded Active (Central) Card */
        .carousel-card.active-center {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4), 
                        inset 0 0 18px rgba(212, 175, 55, 0.2);
            z-index: 10;
        }

        .carousel-card.active-center img {
            filter: brightness(1.15) contrast(1.1);
        }

        /* "ЕЩЁ" Card */
        .card-more {
            position: absolute;
            left: 50%;
            margin-left: -45px;
            width: 90px;
            height: 68px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 14px;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 15;
            overflow: visible;
        }

        .card-more:hover {
            transform: scale(1.1) rotateX(12deg) rotateY(-8deg);
            border-color: var(--accent-gold);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .card-more-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(45deg, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.4));
        }

        /* Spinner Overlay */
        .spinner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 12, 11, 0.75);
            z-index: 90;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .spinner-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-gold);
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Inline SVG definition for the feathered mask -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
        <defs>
            <!-- Feather blur filter applied to the mask boundary -->
            <filter id="feather-blur">
                <feGaussianBlur stdDeviation="8" />
            </filter>
            <!-- The mask structure: everything black is hidden, everything white is shown -->
            <mask id="lightning-mask" maskContentUnits="userSpaceOnUse">
                <rect width="100%" height="100%" fill="black" />
                <polygon id="mask-polygon" fill="white" filter="url(#feather-blur)" />
            </mask>
        </defs>
    </svg>

    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const locations = [
            {
                id: "lobby_1",
                before: "pic/Вестибюль_1_ДО.jpg",
                after: "pic/Вестибюль_1.jpg"
            },
            {
                id: "lobby_3",
                before: "pic/Вестибюль_3_ДО.jpg",
                after: "pic/Вестибюль_3.jpg"
            },
            {
                id: "concert_1",
                before: "pic/Концертный_зал_1_ДО.jpg",
                after: "pic/Концертный_зал_1.jpg"
            },
            {
                id: "concert_2",
                before: "pic/Концертный_зал_2_до.jpg",
                after: "pic/Концертный_зал_2.jpg"
            },
            {
                id: "concert_3",
                before: "pic/Концертный_зал_3_ДО.jpg",
                after: "pic/Концертный_зал_3.jpg"
            },
            {
                id: "lounge_2",
                before: "pic/Лаундж_2_ДО.jpg",
                after: "pic/Лаундж_2.jpg"
            },
            {
                id: "lounge_3",
                before: "pic/Лаундж_3 ДО.jpg",
                after: "pic/Лаундж_3.jpg"
            },
            {
                id: "private_2",
                before: "pic/Приватные_команты_2_до.jpg",
                after: "pic/Приватные_команты_2.jpg"
            }
        ];

        function App() {
            const [activeLocIndex, setActiveLocIndex] = useState(0);
            const [sliderPos, setSliderPos] = useState(50); // Set default to 50% split
            const [isDragging, setIsDragging] = useState(false);
            const [isCollapsed, setIsCollapsed] = useState(true);
            
            const [beforeLoaded, setBeforeLoaded] = useState(false);
            const [afterLoaded, setAfterLoaded] = useState(false);

            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            const timerRef = useRef(null);
            
            // Mutable references for animation loop parameters
            const timeRef = useRef(0);
            const sliderPosRef = useRef(50);
            const prevXRef = useRef(null);
            const [winSize, setWinSize] = useState({ w: window.innerWidth, h: window.innerHeight });

            // Keep reference updated to read the latest state inside animation frames
            useEffect(() => {
                sliderPosRef.current = sliderPos;
            }, [sliderPos]);

            // Handle resize dynamically mapping to container bounds
            useEffect(() => {
                const handleResize = () => {
                    const container = containerRef.current;
                    const canvas = canvasRef.current;
                    if (container && canvas) {
                        const rect = container.getBoundingClientRect();
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                        setWinSize({ w: rect.width, h: rect.height });
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize(); // Initial call
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Inactivity timer logic for sidebar collapse
            const resetInactivityTimer = () => {
                if (timerRef.current) {
                    clearTimeout(timerRef.current);
                }
                timerRef.current = setTimeout(() => {
                    setIsCollapsed(true);
                }, 2000);
            };

            const handleSidebarInteraction = () => {
                setIsCollapsed(false);
                resetInactivityTimer();
            };

            const handleSidebarMouseLeave = () => {
                resetInactivityTimer();
            };

            // Cleanup timer on unmount
            useEffect(() => {
                return () => {
                    if (timerRef.current) clearTimeout(timerRef.current);
                };
            }, []);

            // Lightning Animation and Mask update Loop
            useEffect(() => {
                let animationFrameId;
                
                const renderLightning = () => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const width = canvas.width;
                    const height = canvas.height;
                    const maskPoly = document.getElementById('mask-polygon');
                    
                    // Clear canvas
                    ctx.clearRect(0, 0, width, height);

                    const currentSliderPercent = sliderPosRef.current;
                    const targetX = (currentSliderPercent / 100) * width;

                    // Initialize prevX if null
                    if (prevXRef.current === null) {
                        prevXRef.current = targetX;
                    }

                    // Calculate physical movement speed (delta)
                    const deltaX = targetX - prevXRef.current;
                    prevXRef.current = targetX;

                    // Adjust time increment based on movement velocity
                    const dt = Math.abs(deltaX) > 0.01 ? 0.015 : 0.003;
                    timeRef.current += dt;
                    const time = timeRef.current;

                    // Boundary conditions for full screen reveals
                    if (currentSliderPercent >= 99.8) {
                        if (maskPoly) {
                            maskPoly.setAttribute('points', `0,0 ${width},0 ${width},${height} 0,${height}`);
                        }
                        animationFrameId = requestAnimationFrame(renderLightning);
                        return;
                    }
                    if (currentSliderPercent <= 0.2) {
                        if (maskPoly) {
                            maskPoly.setAttribute('points', `0,0 0,0 0,${height} 0,${height}`);
                        }
                        animationFrameId = requestAnimationFrame(renderLightning);
                        return;
                    }

                    // Generate coordinates for the lightning path
                    const points = [];
                    const stepY = 10;
                    const steps = Math.ceil(height / stepY);
                    const sliderFactor = currentSliderPercent * 0.03;

                    for (let i = 0; i <= steps; i++) {
                        const y = i * stepY;
                        
                        // Noise waves for generating organic lightning bends
                        const noiseVal = 
                            Math.sin(y * 0.015 + time * 1.5 + sliderFactor) * 0.5 +
                            Math.sin(y * 0.04 - time * 2.2 + sliderFactor * 1.5) * 0.35 +
                            Math.cos(y * 0.1 + time * 4.0) * 0.15;

                        // Maximum wiggling displacement amplitude is 15 pixels
                        const dx = noiseVal * 15;
                        points.push({ x: targetX + dx, y: y });
                    }

                    // Update the SVG mask polygon points (feathered edge matches the lightning)
                    if (maskPoly) {
                        const polyPoints = `0,0 ` + points.map(p => `${Math.round(p.x)},${Math.round(p.y)}`).join(' ') + ` 0,${height}`;
                        maskPoly.setAttribute('points', polyPoints);
                    }

                    // Draw the glowing lightning bolt
                    const flicker = 0.85 + 0.15 * Math.sin(time * 3.5) * Math.cos(time * 1.2);

                    // Outer glowing path
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 35;
                    ctx.strokeStyle = `rgba(255, 140, 0, ${0.08 * flicker})`;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();

                    // Medium golden glow with dynamically varying thickness along height
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = 'rgba(212, 175, 55, 0.7)';
                    for (let i = 0; i < points.length - 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[i+1].x, points[i+1].y);
                        
                        const yMid = (points[i].y + points[i+1].y) / 2;
                        const localIntensity = 0.75 + 0.25 * Math.sin(yMid * 0.02 + time * 1.5);
                        
                        ctx.lineWidth = 9 * localIntensity;
                        ctx.strokeStyle = `rgba(212, 175, 55, ${0.4 * localIntensity * flicker})`;
                        ctx.stroke();
                    }
                    ctx.shadowBlur = 0;

                    // Inner bright core
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.lineWidth = 2.0;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.95 * flicker})`;
                    ctx.stroke();

                    animationFrameId = requestAnimationFrame(renderLightning);
                };

                animationFrameId = requestAnimationFrame(renderLightning);
                return () => cancelAnimationFrame(animationFrameId);
            }, []);

            // Handle slider position updates
            const updatePosition = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = clientX - rect.left;
                let percentage = (x / rect.width) * 100;
                if (percentage < 0) percentage = 0;
                if (percentage > 100) percentage = 100;
                
                setSliderPos(percentage);
            };

            // Mouse Event Handlers
            const handleMouseDown = (e) => {
                if (e.button !== 0) return; // Only allow left-click drag
                setIsDragging(true);
                updatePosition(e.clientX);
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                updatePosition(e.clientX);
            };

            const handleMouseUpOrLeave = () => {
                setIsDragging(false);
            };

            // Touch Event Handlers for mobile support
            const handleTouchStart = (e) => {
                setIsDragging(true);
                if (e.touches.length > 0) {
                    updatePosition(e.touches[0].clientX);
                }
            };

            const handleTouchMove = (e) => {
                if (!isDragging) return;
                if (e.touches.length > 0) {
                    updatePosition(e.touches[0].clientX);
                }
            };

            const handleTouchEnd = () => {
                setIsDragging(false);
            };

            const handleCardClick = (offset) => {
                if (offset === 0) return; // Central card clicked does nothing
                
                setBeforeLoaded(false);
                setAfterLoaded(false);
                
                // Calculate next index in looped circular logic
                const nextIndex = (activeLocIndex + offset + locations.length) % locations.length;
                setActiveLocIndex(nextIndex);
                
                handleSidebarInteraction();
            };

            const posRatio = sliderPos / 100;
            const isPageLoading = !beforeLoaded || !afterLoaded;
            const activeLoc = locations[activeLocIndex];

            // Render offsets [-2, -1, 0, 1, 2] to create the vertical looped list
            const visibleOffsets = [-2, -1, 0, 1, 2];

            return (
                <div 
                    ref={containerRef}
                    className={`comparison-container ${isDragging ? 'dragging' : ''}`}
                    onMouseDown={handleMouseDown}
                    onMouseMove={handleMouseMove}
                    onMouseUp={handleMouseUpOrLeave}
                    onMouseLeave={handleMouseUpOrLeave}
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}
                    style={{
                        '--slider-pos': `${sliderPos}%`,
                        '--slider-pos-ratio': posRatio
                    }}
                >
                    {/* Glassmorphic 3D Carousel Sidebar Container */}
                    <div 
                        className={`sidebar-carousel-container ${!isCollapsed ? 'expanded' : ''}`}
                        onMouseEnter={handleSidebarInteraction}
                        onMouseMove={handleSidebarInteraction}
                        onMouseLeave={handleSidebarMouseLeave}
                        onMouseDown={(e) => e.stopPropagation()}
                        onTouchStart={(e) => {
                            e.stopPropagation();
                            handleSidebarInteraction();
                        }}
                    >
                        {/* Glass tube track background */}
                        <div className="sidebar-track"></div>

                        {/* Collapsed "ЕЩЁ" card */}
                        <div 
                            className="card-more"
                            style={{
                                opacity: isCollapsed ? 1 : 0,
                                transform: isCollapsed ? 'scale(1)' : 'scale(0.5)',
                                pointerEvents: isCollapsed ? 'auto' : 'none'
                            }}
                            onClick={handleSidebarInteraction}
                        >
                            <span className="card-more-text">ЕЩЁ</span>
                        </div>

                        {/* Infinite vertical list cards */}
                        {visibleOffsets.map((offset) => {
                            const locIdx = (activeLocIndex + offset + locations.length) % locations.length;
                            const loc = locations[locIdx];
                            
                            // Calculate properties based on offset
                            const yTranslate = isCollapsed ? 0 : offset * 85;
                            const scaleVal = isCollapsed 
                                ? 0.8 
                                : (offset === 0 ? 1.15 : (1 - Math.abs(offset) * 0.08));
                            const opacityVal = isCollapsed ? 0 : (1 - Math.abs(offset) * 0.25);
                            
                            const cardStyle = {
                                '--card-translate-y': `${yTranslate}px`,
                                transform: `translate3d(0, ${yTranslate}px, 0) scale(${scaleVal})`,
                                opacity: opacityVal,
                                pointerEvents: (!isCollapsed && offset !== 0) ? 'auto' : 'none'
                            };

                            const cardClass = `carousel-card ${offset === 0 ? 'active-center' : ''} ${(!isCollapsed && offset !== 0) ? 'clickable' : ''}`;

                            return (
                                <div 
                                    key={`${loc.id}-${offset}`}
                                    className={cardClass}
                                    style={cardStyle}
                                    onClick={() => handleCardClick(offset)}
                                >
                                    <img 
                                        src={loc.after} 
                                        alt={loc.id} 
                                    />
                                </div>
                            );
                        })}
                    </div>

                    {/* Loader Spinner Overlay */}
                    <div className={`spinner-overlay ${isPageLoading ? 'show' : ''}`}>
                        <div className="spinner"></div>
                    </div>

                    {/* Canvas for Rendering the Lightning Bolt */}
                    <canvas ref={canvasRef} className="lightning-canvas" />

                    {/* Before Image (Top Layer) */}
                    <div className="image-wrapper image-before">
                        <img 
                            src={activeLoc.before} 
                            alt="Было"
                            className={beforeLoaded ? 'loaded' : ''}
                            onLoad={() => setBeforeLoaded(true)}
                        />
                    </div>

                    {/* After Image (Base Layer) */}
                    <div className="image-wrapper image-after">
                        <img 
                            src={activeLoc.after} 
                            alt="Стало"
                            className={afterLoaded ? 'loaded' : ''}
                            onLoad={() => setAfterLoaded(true)}
                        />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
